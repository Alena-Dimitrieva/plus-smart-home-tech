syntax = "proto3";

package telemetry.service.collector;

option java_multiple_files = true;
option java_package = "ru.yandex.practicum.telemetry.proto";

import "google/protobuf/timestamp.proto";

message HubEventProto {
  string hub_id = 1;
  google.protobuf.Timestamp timestamp = 2;

  oneof payload {
    DeviceAddedEvent device_added = 3;
    DeviceRemovedEvent device_removed = 4;
    ScenarioAddedEvent scenario_added = 5;
    ScenarioRemovedEvent scenario_removed = 6;
  }
}

message DeviceAddedEvent {
  string id = 1;
  DeviceType type = 2;
}

message DeviceRemovedEvent {
  string id = 1;
}

message ScenarioAddedEvent {
  string name = 1;
  repeated ScenarioCondition conditions = 2;
  repeated DeviceAction actions = 3;
}

message ScenarioRemovedEvent {
  string name = 1;
}

enum DeviceType {
  UNKNOWN_DEVICE = 0;
  MOTION_SENSOR = 1;
  TEMPERATURE_SENSOR = 2;
  LIGHT_SENSOR = 3;
  CLIMATE_SENSOR = 4;
  SWITCH_SENSOR = 5;
}

message ScenarioCondition {
  string sensor_id = 1;
  ConditionType type = 2;
  ConditionOperation operation = 3;
  int32 value = 4;
}

enum ConditionType {
  UNKNOWN_CONDITION = 0;
  TEMPERATURE = 1;
  HUMIDITY = 2;
  CO2_LEVEL = 3;
  LUMINOSITY = 4;
  MOTION = 5;
  SWITCH_STATE = 6;
}

enum ConditionOperation {
  UNKNOWN_OPERATION = 0;
  EQUALS = 1;
  GREATER_THAN = 2;
  LESS_THAN = 3;
}

message DeviceAction {
  string sensor_id = 1;
  ActionType type = 2;
  int32 value = 3;
}

enum ActionType {
  UNKNOWN_ACTION = 0;
  SET_SWITCH_STATE = 1;
  SET_LUMINOSITY = 2;
}