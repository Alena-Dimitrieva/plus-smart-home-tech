syntax = "proto3";

package telemetry.service.collector;

option java_multiple_files = true;
option java_package = "ru.yandex.practicum.telemetry.proto";

import "google/protobuf/timestamp.proto";

message SensorEventProto {
  string id = 1;
  string hub_id = 2;
  google.protobuf.Timestamp timestamp = 3;

  oneof payload {
    TemperatureSensorEvent temperature_sensor = 4;
    LightSensorEvent light_sensor = 5;
    MotionSensorEvent motion_sensor = 6;
    ClimateSensorEvent climate_sensor = 7;
    SwitchSensorEvent switch_sensor = 8;
  }
}

message TemperatureSensorEvent {
  int32 temperature_c = 1;
  int32 temperature_f = 2;
}

message LightSensorEvent {
  int32 luminosity = 1;
  int32 link_quality = 2;
}

message MotionSensorEvent {
  bool motion_detected = 1;
  int32 link_quality = 2;
  int32 voltage = 3;
}

message ClimateSensorEvent {
  int32 temperature_c = 1;
  int32 humidity = 2;
  int32 co2_level = 3;
}

message SwitchSensorEvent {
  bool switch_state = 1;
}

message CollectorResponse {
  bool success = 1;
  string message = 2;
}