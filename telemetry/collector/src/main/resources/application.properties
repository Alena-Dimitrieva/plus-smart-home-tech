server.port=8080

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.listener.auto-startup=false

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=ru.yandex.practicum.telemetry.serialization.AvroSerializer

kafka.topic.sensors=telemetry.sensors.v1
kafka.topic.hubs=telemetry.hubs.v1

logging.level.ru.yandex.practicum=DEBUG

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always